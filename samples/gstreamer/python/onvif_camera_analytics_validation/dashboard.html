<!DOCTYPE html>
<html><head>
<title>ONVIF Analytics Validation</title>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px}
  h1{color:#00d4ff;margin-bottom:20px;font-size:22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .panel{background:#16213e;border-radius:8px;padding:16px;border:1px solid #0f3460}
  .panel h2{color:#00d4ff;font-size:13px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
  #frame{max-width:100%;border-radius:4px;background:#000;min-height:240px;display:block}
  .event-data{font-size:13px;color:#ffd3b6;font-family:monospace;white-space:pre-wrap;max-height:260px;overflow-y:auto}
  .waiting{color:#666;font-style:italic}
  .nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
  .nav button{background:#0f3460;color:#e0e0e0;border:1px solid #1a5276;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:14px}
  .nav button:hover{background:#1a5276}
  .nav button:disabled{opacity:0.3;cursor:default}
  .nav span{color:#00d4ff;font-size:15px;min-width:120px;text-align:center}
  .live-badge{display:inline-block;background:#2d6a4f;color:#a8e6cf;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:bold;margin-left:8px}
  .vlm-text{font-size:13px;line-height:1.6;white-space:pre-wrap;color:#a8e6cf;padding:10px;background:#0f3460;border-radius:6px;max-height:300px;overflow-y:auto}
  .vlm-section{margin-bottom:12px;padding:10px;border-radius:6px}
  .vlm-section-header{font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:bold;margin-bottom:4px}
  .vlm-section-body{font-size:13px;line-height:1.5}
  .vlm-mqtt{background:#1b3a4b;border:1px solid #2d6a8a}
  .vlm-mqtt .vlm-section-header{color:#88c0d0}
  .vlm-mqtt .vlm-section-body{color:#c8e6f0}
  .vlm-obs{background:#1b3a2b;border:1px solid #2d8a4a}
  .vlm-obs .vlm-section-header{color:#a8e6cf}
  .vlm-obs .vlm-section-body{color:#c8f0d0}
  .vlm-weapon{background:#3a1b1b;border:1px solid #8a3a3a}
  .vlm-weapon .vlm-section-header{color:#f4845f}
  .vlm-weapon .vlm-section-body{color:#f0c8c8}
  .vlm-weapon-safe{background:#1b3a2b;border:1px solid #2d8a4a}
  .vlm-weapon-safe .vlm-section-header{color:#a8e6cf}
  .vlm-weapon-safe .vlm-section-body{color:#c8f0d0}
  @media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head><body>
<h1>ONVIF Analytics Validation &mdash; DLStreamer and VLM</h1>
<div class="nav">
  <button id="btn-prev" onclick="nav(-1)">&larr; Previous</button>
  <span id="nav-label">No events yet</span>
  <button id="btn-next" onclick="nav(1)">Next &rarr;</button>
  <button id="btn-latest" onclick="goLatest()">Latest</button>
</div>
<!-- Row 1: Frame | VLM Interpretation -->
<div class="grid">
  <div class="panel">
    <h2>Camera Frame <span id="event-num-label"></span></h2>
    <img id="frame" alt="waiting for frame..."/>
  </div>
  <div class="panel">
    <h2>VLM Validation</h2>
    <div id="vlm-output"><div class="waiting">Waiting for events...</div></div>
  </div>
</div>
<!-- Row 2: MQTT Event -->
<div class="panel">
  <h2>MQTT Event (Raw)</h2>
  <pre id="event" class="event-data">Waiting for events...</pre>
</div>
<script>
var total=0, viewIdx=0, isLive=true;
function nav(d){
  if(total===0)return;
  var n=viewIdx+d;
  if(n<1)n=1; if(n>total)n=total;
  viewIdx=n; isLive=(viewIdx===total);
  loadEvent(viewIdx);
}
function goLatest(){viewIdx=total;isLive=true;if(total>0)loadEvent(viewIdx);}
function loadEvent(idx){
  fetch('/api/event/'+idx).then(function(r){return r.json()}).then(function(d){
    showData(d,idx);
  }).catch(function(){});
}
function parseVlmSections(text){
  // Parse VLM response into 3 labeled sections using **Header:** pattern
  var sections={mqtt:'',obs:'',weapon:''};
  var clean=text.replace(/\*\*/g,'');  // strip markdown bold markers
  // Split on known section headers
  var mqttMatch=clean.match(/MQTT\s*Event\s*:\s*([\s\S]*?)(?=VLM\s*Observation\s*:|Weapon\s*Check\s*:|$)/i);
  var obsMatch=clean.match(/VLM\s*Observation\s*:\s*([\s\S]*?)(?=Weapon\s*Check\s*:|$)/i);
  var weaponMatch=clean.match(/Weapon\s*Check\s*:\s*([\s\S]*?)$/i);
  if(mqttMatch)sections.mqtt=mqttMatch[1].trim();
  if(obsMatch)sections.obs=obsMatch[1].trim();
  if(weaponMatch)sections.weapon=weaponMatch[1].trim();
  return sections;
}
function esc(s){return s.replace(/</g,'&lt;').replace(/\n/g,'<br>');}
function renderVlm(text){
  if(!text)return '<div class="waiting">No VLM response</div>';
  var s=parseVlmSections(text);
  // If parsing found at least one section, render structured
  if(s.mqtt||s.obs||s.weapon){
    var hasWeapon=s.weapon&&!/no weapon|none|not visible|not detected|no dangerous/i.test(s.weapon);
    var weaponCls=hasWeapon?'vlm-weapon':'vlm-weapon-safe';
    var h='';
    h+='<div class="vlm-section vlm-mqtt"><div class="vlm-section-header">● Camera Detected (MQTT)</div><div class="vlm-section-body">'+esc(s.mqtt||'N/A')+'</div></div>';
    h+='<div class="vlm-section '+weaponCls+'"><div class="vlm-section-header">● Weapon Check - VLM</div><div class="vlm-section-body">'+esc(s.weapon||'N/A')+'</div></div>';
    h+='<div class="vlm-section vlm-obs"><div class="vlm-section-header">● VLM Observation</div><div class="vlm-section-body">'+esc(s.obs||'N/A')+'</div></div>';
    return h;
  }
  // Fallback: raw text
  return '<div class="vlm-text">'+esc(text)+'</div>';
}
function showData(d,idx){
  // MQTT event panel
  var evEl=document.getElementById('event');
  var evText='';
  if(d.mqtt_topic)evText='Topic: '+d.mqtt_topic+'\n\n';
  evText+=(d.mqtt_payload||'(none)');
  evEl.textContent=evText;
  // VLM interpretation panel
  var vlmEl=document.getElementById('vlm-output');
  vlmEl.innerHTML=renderVlm(d.vlm_text);
  // Frame
  var img=document.getElementById('frame');
  var src='/frame/'+idx+'?'+Date.now();
  var tmp=new Image();tmp.onload=function(){img.src=src};tmp.onerror=function(){};
  tmp.src=src;
  document.getElementById('event-num-label').textContent='(Event #'+idx+')';
  updateNav();
}
function updateNav(){
  document.getElementById('btn-prev').disabled=(viewIdx<=1);
  document.getElementById('btn-next').disabled=(viewIdx>=total);
  if(total===0){
    document.getElementById('nav-label').innerHTML='No events yet';
    return;
  }
  var lbl='Event '+viewIdx+' / '+total;
  if(isLive)lbl+=' <span class="live-badge">LIVE</span>';
  document.getElementById('nav-label').innerHTML=lbl;
}
function poll(){
  fetch('/api/status').then(function(r){return r.json()}).then(function(d){
    var newTotal=d.event_count||0;
    if(newTotal!==total){
      total=newTotal;
      if(isLive&&total>0){viewIdx=total;loadEvent(viewIdx);}
      updateNav();
    }
  }).catch(function(){});
}
setInterval(poll,2000);poll();
</script>
</body></html>
