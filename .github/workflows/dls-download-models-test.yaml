name: "[DLS] Test models downloading"
run-name: "[DLS] Test models downloading (by @${{ github.actor }} via ${{ github.event_name }})"
on:
  push:
    branches:
      - 'nsz-models-migration'
  workflow_dispatch:
    inputs:
      run_full_other_all_example:
        description: "Run heavy README example: ./download_other_models.sh all"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      run_full_other_all_example:
        description: "Run heavy README example: ./download_other_models.sh all"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  setup:
    name: Setup models downloading test configuration
    runs-on: dlstreamer
    outputs:
      should_run: ${{ steps.skip-check.outputs.should_run }}
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if should skip CI
        id: skip-check
        uses: ./.github/actions/common/check-skip-ci
        with:
          job_name: "Test models downloading"
          working_directory: "."

  test-readme-hf-examples:
    name: README examples - Hugging Face script
    runs-on: dlstreamer
    needs: setup
    env:
      HF_OUTDIR: ${{ github.workspace }}/artifacts/hf
      HF_VENV: ${{ github.workspace }}/.venv-download-hf-models
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ README HF examples skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason:** Changes only in excluded files" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Checkout repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Create venv and install HF script dependencies
        if: needs.setup.outputs.should_run == 'true'
        run: |
          python3 -m venv "$HF_VENV"
          "$HF_VENV/bin/python" -m pip install --upgrade pip
          "$HF_VENV/bin/python" -m pip install -r scripts/download_models/requirements_download_hf_models.txt

      - name: README example - standard HF export
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$HF_OUTDIR/standard"
          cd scripts/download_models
          "$HF_VENV/bin/python" download_hf_models.py \
            --model dima806/fairface_age_image_detection@4e02ab8057ea7fd74b1670940995c5dfda3e6ec0 \
            --outdir "$HF_OUTDIR/standard"
          find "$HF_OUTDIR/standard" -name '*.xml' | grep -q .

      - name: README example - extra args passthrough
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$HF_OUTDIR/extra-args"
          cd scripts/download_models
          "$HF_VENV/bin/python" download_hf_models.py \
            --model dima806/fairface_gender_image_detection@a8e129dc622dafa08bd2ee2e0fd05759850ae14e \
            --extra_args --weight-format int8 \
            --outdir "$HF_OUTDIR/extra-args"
          find "$HF_OUTDIR/extra-args" -name '*.xml' | grep -q .

      - name: README example - --token flag path
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$HF_OUTDIR/token"
          cd scripts/download_models
          # Public model with token flag validates CLI path for gated/private example usage.
          "$HF_VENV/bin/python" download_hf_models.py \
            --model dima806/facial_age_image_detection@ad35933da48272de7295530766f3d6c56702eba8 \
            --token fake_token_for_cli_path \
            --outdir "$HF_OUTDIR/token"
          find "$HF_OUTDIR/token" -name '*.xml' | grep -q .

      - name: README example - explicit revision override
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$HF_OUTDIR/revision"
          cd scripts/download_models
          "$HF_VENV/bin/python" download_hf_models.py \
            --model openai/clip-vit-base-patch32@3d74acf9a28c67741b2f4f2ea7635f0aaf6f0268 \
            --outdir "$HF_OUTDIR/revision"
          find "$HF_OUTDIR/revision" -name '*.xml' | grep -q .

  test-readme-ultralytics-examples:
    name: README examples - Ultralytics script
    runs-on: dlstreamer
    needs: setup
    env:
      ULT_OUTDIR: ${{ github.workspace }}/artifacts/ultralytics
      ULT_VENV: ${{ github.workspace }}/.venv-download-ultralytics-models
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ README Ultralytics examples skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason:** Changes only in excluded files" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Checkout repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Create venv and install Ultralytics script dependencies
        if: needs.setup.outputs.should_run == 'true'
        run: |
          python3 -m venv "$ULT_VENV"
          "$ULT_VENV/bin/python" -m pip install --upgrade pip
          "$ULT_VENV/bin/python" -m pip install -r scripts/download_models/requirements_download_ultralytics_models.txt

      - name: README example - export by model name
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$ULT_OUTDIR/by-name"
          cd scripts/download_models
          "$ULT_VENV/bin/python" download_ultralytics_models.py --model yolo11n.pt --outdir "$ULT_OUTDIR/by-name"
          find "$ULT_OUTDIR/by-name" -name '*.xml' | grep -q .

      - name: README example - pinned model by release tag
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$ULT_OUTDIR/pinned"
          cd scripts/download_models
          "$ULT_VENV/bin/python" download_ultralytics_models.py --model yolo11n.pt@v8.4.0 --outdir "$ULT_OUTDIR/pinned"
          find "$ULT_OUTDIR/pinned" -name '*.xml' | grep -q .

      - name: README example - local checkpoint with FP16
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$ULT_OUTDIR/local-half"
          cd scripts/download_models
          curl -fsSL -o yolo11n.pt \
            https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo11n.pt
          "$ULT_VENV/bin/python" download_ultralytics_models.py --model "$PWD/yolo11n.pt" --outdir "$ULT_OUTDIR/local-half" --half
          find "$ULT_OUTDIR/local-half" -name '*.xml' | grep -q .

      - name: README example - INT8 export
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$ULT_OUTDIR/int8"
          cd scripts/download_models
          "$ULT_VENV/bin/python" download_ultralytics_models.py --model yolo11s.pt --outdir "$ULT_OUTDIR/int8" --int8
          find "$ULT_OUTDIR/int8" -name '*.xml' | grep -q .

  test-readme-timm-examples:
    name: README examples - TIMM script
    runs-on: dlstreamer
    needs: setup
    env:
      TIMM_OUTDIR: ${{ github.workspace }}/artifacts/timm
      TIMM_VENV: ${{ github.workspace }}/.venv-download-timm-models
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ README TIMM examples skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason:** Changes only in excluded files" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Checkout repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Create venv and install TIMM script dependencies
        if: needs.setup.outputs.should_run == 'true'
        run: |
          python3 -m venv "$TIMM_VENV"
          "$TIMM_VENV/bin/python" -m pip install --upgrade pip
          "$TIMM_VENV/bin/python" -m pip install -r scripts/download_models/requirements_download_timm_models.txt

      - name: README example - list supported TIMM models
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          "$TIMM_VENV/bin/python" download_timm_models.py list-models | grep -q "efficientnet_b0"

      - name: README example - export FP16
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          "$TIMM_VENV/bin/python" download_timm_models.py import \
            --model efficientnet_b0@1b5383e5f79cc0f7fc067e372f8f26a5fa73f26a \
            --precision fp16 \
            --output-dir "$TIMM_OUTDIR"
          test -f "$TIMM_OUTDIR/public/efficientnet_b0/FP16/efficientnet_b0.xml"

      - name: README example - export INT8 only
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          "$TIMM_VENV/bin/python" download_timm_models.py import \
            --model efficientnet_b0@1b5383e5f79cc0f7fc067e372f8f26a5fa73f26a \
            --precision int8 \
            --output-dir "$TIMM_OUTDIR"
          test -f "$TIMM_OUTDIR/public/efficientnet_b0/INT8/efficientnet_b0.xml"

      - name: README example - export FP16 and INT8
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          "$TIMM_VENV/bin/python" download_timm_models.py import \
            --model efficientnet_b0@1b5383e5f79cc0f7fc067e372f8f26a5fa73f26a \
            --precision both \
            --output-dir "$TIMM_OUTDIR"
          test -f "$TIMM_OUTDIR/public/efficientnet_b0/FP16/efficientnet_b0.xml"
          test -f "$TIMM_OUTDIR/public/efficientnet_b0/INT8/efficientnet_b0.xml"

  test-readme-other-models-examples:
    name: README examples - Other models script
    runs-on: dlstreamer
    needs: setup
    env:
      MODELS_PATH: ${{ github.workspace }}/artifacts/other
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ README other-models examples skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason:** Changes only in excluded files" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Checkout repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: README example - download only mars-small128
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          bash download_other_models.sh mars-small128
          test -f "$MODELS_PATH/public/mars-small128/FP32/mars_small128_fp32.xml"
          test -f "$MODELS_PATH/public/mars-small128/INT8/mars_small128_int8.xml"

      - name: README example - download all models (optional heavy)
        if: needs.setup.outputs.should_run == 'true' && inputs.run_full_other_all_example
        run: |
          cd scripts/download_models
          bash download_other_models.sh all
          test -f "$MODELS_PATH/public/centerface/FP32/centerface.xml"

  test-download-other-models-cli-validation:
    name: download_other_models.sh validation
    runs-on: dlstreamer
    needs: setup
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ download_other_models.sh validation skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason:** Changes only in excluded files" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Checkout repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Verify help output
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          output=$(bash download_other_models.sh --help)
          echo "$output" | grep -q "Usage:"
          echo "$output" | grep -q "Arguments:"
          echo "$output" | grep -q "MODELS_PATH"

      - name: Verify missing MODELS_PATH handling
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          unset MODELS_PATH
          if bash download_other_models.sh mars-small128 2>&1 | grep -q "MODELS_PATH is not specified"; then
            echo "Missing MODELS_PATH handling works"
          else
            echo "Missing MODELS_PATH handling failed"
            exit 1
          fi

      - name: Verify invalid model handling
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd scripts/download_models
          export MODELS_PATH="$HOME/models"
          if bash download_other_models.sh invalid_model_xyz 2>&1 | grep -q "Unsupported model"; then
            echo "Invalid model handling works"
          else
            echo "Invalid model handling failed"
            exit 1
          fi

  test-ubuntu-2204-compatibility:
    name: Ubuntu 22.04 compatibility (README command)
    runs-on: ubuntu-22.04
    needs: setup
    env:
      U22_OUTDIR: ${{ github.workspace }}/artifacts/u22
      U22_ULT_VENV: ${{ github.workspace }}/.venv-download-ultralytics-models-u22
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ Ubuntu 22.04 compatibility skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason:** Changes only in excluded files" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Checkout repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Create venv and install Ultralytics script dependencies
        if: needs.setup.outputs.should_run == 'true'
        run: |
          python3 -m venv "$U22_ULT_VENV"
          "$U22_ULT_VENV/bin/python" -m pip install --upgrade pip
          "$U22_ULT_VENV/bin/python" -m pip install -r scripts/download_models/requirements_download_ultralytics_models.txt

      - name: Run README Ultralytics command on Ubuntu 22.04
        if: needs.setup.outputs.should_run == 'true'
        run: |
          mkdir -p "$U22_OUTDIR"
          cd scripts/download_models
          "$U22_ULT_VENV/bin/python" download_ultralytics_models.py --model yolo11n.pt --outdir "$U22_OUTDIR"
          find "$U22_OUTDIR" -name '*.xml' | grep -q .
          echo "Ubuntu 22.04 compatibility test successful"
