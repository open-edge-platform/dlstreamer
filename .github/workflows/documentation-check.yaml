name: Documentation Check

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  build-dlstreamer-documentation:
    permissions:
      contents: read # needed for actions/checkout
    runs-on: dlstreamer
    env:
      DOCS_DIR: .
      SIMPLE_MODE: true
      EXCLUDE_PATTERNS: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch all history, otherwise sporadic issue with missing tags
          fetch-depth: 0
          # Fetch tags
          fetch-tags: true
          # Checkout the branch that triggered the workflow
          # to avoid detached HEAD
          ref: ${{ github.event.pull_request.head.sha || github.head_ref }}
          persist-credentials: false

      - name: Check if should skip CI
        id: skip-check
        uses: ./.github/actions/common/check-skip-ci
        with:
          job_name: "Build dlstreamer documentation"
          working_directory: "."

      - name: Determine if documentation CI should run
        if: steps.skip-check.outputs.run_docs_ci == 'false'
        run: echo "Documentation CI is not needed, skipping remaining steps." && exit 0

      - name: Download template
        if: env.SIMPLE_MODE == 'true' && steps.skip-check.outputs.run_docs_ci == 'true'
        shell: bash
        run: |
          cd "${GITHUB_WORKSPACE}/${DOCS_DIR}"
          wget https://docs.openedgeplatform.intel.com/template/template.tar.gz
          # Override any existing files with template
          tar xf template.tar.gz
          if [ -f "dictionary_append.txt" ]; then
            cat "dictionary_append.txt" >> "dict.txt"
          fi

      - name: Add exclude patterns
        if: steps.skip-check.outputs.run_docs_ci == 'true'
        shell: bash
        run: |
          # Remove any spaces
          exclude_no_spaces="${EXCLUDE_PATTERNS// /}"
          # Surround patterns with quotes and create Python list
          exclude_pattern="[\"${exclude_no_spaces//,/\", \"}\"]"
          conf_files=$(find "${GITHUB_WORKSPACE}" -type f -path "*/docs/conf.py")
          for conf_file in $conf_files; do
            echo "exclude_patterns.extend(${exclude_pattern})" >> "$conf_file"
          done

      - name: Build Documentation
        if: steps.skip-check.outputs.run_docs_ci == 'true'
        shell: bash
        run: |
          cd "${GITHUB_WORKSPACE}/${DOCS_DIR}"
          make build
