name: "[DLS] PR workflow"
run-name: "[DLS] PR  workflow (by @${{ github.actor }} via ${{ github.event_name }})"
on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/**'
      - 'cmake/**'
      - 'docker/**'
      - 'include/**'
      - 'python/**'
      - 'samples/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'thirdparty/**'
      - 'docs/**'
  pull_request:
    paths:
      - '.github/**'
      - 'cmake/**'
      - 'docker/**'
      - 'include/**'
      - 'python/**'
      - 'samples/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'thirdparty/**'
      - 'docs/**'
  workflow_call:
    inputs:
      test-repo-branch:
        description: "Branch in dl-streamer-tests repo (default is main)"
        required: false
        type: string
        default: "main"
  workflow_dispatch:
    inputs:
      test-repo-branch:
        description: "Branch in dl-streamer-tests repo (default is main)"
        required: false
        type: string
        default: "main"
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
check-skip-ci:
  permissions:
    contents: read
  name: "Check if CI should be skipped"
  runs-on: dlstreamer
  outputs:
    skip_ci: ${{ steps.check.outputs.skip_ci }}
  steps:
    - name: Check out dlstreamer repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
      with:
        persist-credentials: false
        fetch-depth: 0
        path: dlstreamer-repo

    - name: Fetch main branch for comparison
      run: |
        cd dlstreamer-repo
        git fetch origin main

    - name: Check if changes are only in docs/ and specific documentation files
      id: check
      run: |
        echo "🔍 Checking for changes outside documentation and configuration files"
        cd dlstreamer-repo
        CHANGED_FILES_CODE=$(git diff --name-only origin/main...HEAD -- \
          ':!docs/' \
          ':!.github/ISSUE_TEMPLATES/' \
          ':!.github/skills/' \
          ':!.github/CODEOWNERS' \
          ':!.github/PULL_REQUEST_TEMPLATE.md' \
          ':!README.md' \
          ':!SECURITY.md' \
          ':!LICENSE' \
          ':!CONTRIBUTING.md' \
          ':!CHANGELOG.md' \
          ':!CODESTYLE.md' \
          ':!CODE_OF_CONDUCT.md')
        
        echo "skip_ci=true" >> "$GITHUB_OUTPUT"
        
        if [ -n "${CHANGED_FILES_CODE}" ]; then
          echo "📄 Changed files outside documentation/configuration:"
          echo "${CHANGED_FILES_CODE}"
          echo "skip_ci=false" >> "$GITHUB_OUTPUT"
          echo "🔄 Code changes detected - running full CI"
        else
          echo "✅ All changes are documentation/configuration only - skipping CI jobs"
        fi
  
  # ------------------------------------------------------------- SCANS -------------------------------------------------------------
  dls-code-style:
    permissions:
      contents: read
    name: "DLS SCAN: code-style"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          path: dlstreamer-repo

      - name: Remove thirdparty folder
        run: |
          rm -rf dlstreamer-repo/thirdparty
          rm -rf thirdparty

      - name: Code-style action
        uses: ./dlstreamer-repo/.github/actions/common/code-style
        with:
          target_dir: "dlstreamer-repo"
          name: 'DLS_code-style-check-report'
          fail-on-findings: true

      - name: Clean up
        run: |
          sudo rm -rf dlstreamer-repo

  dls-check-license-headers:
    permissions:
      contents: read
    name: "DLS SCAN: check license headers"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          path: dlstreamer-repo

      - name: Check license headers
        uses: ./dlstreamer-repo/.github/actions/common/license-namespace-checker
        with:
          name: 'DLS_license-check-report'
          path: 'dlstreamer-repo'
          fail-on-findings: true

      - name: Clean up
        run: |
          sudo rm -rf dlstreamer-repo

  dls-static-code-analysis-for-c-cpp:
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    name: "DLS SCAN: static C/C++ code analysis"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-coverity.yaml
    secrets:
      DLS_COVERITY_TOKEN: ${{ secrets.DLS_COVERITY_TOKEN }}
      DLS_COVERITY_EMAIL: ${{ secrets.DLS_COVERITY_EMAIL }}
      DLS_COVERITY_PROJECT: ${{ secrets.DLS_COVERITY_PROJECT }}

  dls-filter-docker-related-changes:
    permissions:
      contents: read
    name: "DLS SCAN: detect changes in docker dir"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    outputs:
      docker_changed: ${{ steps.check.outputs.docker_changed }}
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          path: dlstreamer-repo

      - name: Fetch main branch for comparison
        run: |
          cd dlstreamer-repo
          git fetch origin main

      - name: Detect changes in docker  directory
        id: check
        run: |
          echo "🔍 Checking for changes in 'docker/' dir"
          cd dlstreamer-repo
          CHANGED_FILES_DOCKER=$(git diff --name-only origin/main...HEAD -- 'docker/')

          echo "docker_changed=false" >> "$GITHUB_OUTPUT"

          if [ -n "${CHANGED_FILES_DOCKER}" ]; then
            echo "📄 Changed Docker-related files:"
            echo "${CHANGED_FILES_DOCKER}"
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
            echo "🟡 Docker-related changes detected."
          else
            echo "✅ No docker related changes."
          fi

      - name: Clean up
        run: |
          sudo rm -rf dlstreamer-repo

  dls-trivy-config-scan:
    permissions:
      contents: read
    needs: [check-skip-ci, dls-filter-docker-related-changes]
    if: needs.check-skip-ci.outputs.skip_ci != 'true' && needs.dls-filter-docker-related-changes.outputs.docker_changed == 'true'
    name: "DLS SCAN: Trivy ${{ matrix.name }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dlstreamer_ubuntu22
            path: dlstreamer-repo/docker/ubuntu/ubuntu22.Dockerfile
            output: reports/trivy-DLS_ubuntu22.json
          - name: dlstreamer_ubuntu24
            path: dlstreamer-repo/docker/ubuntu/ubuntu24.Dockerfile
            output: reports/trivy-DLS_ubuntu24.json
          - name: dlstreamer_fedora41
            path: dlstreamer-repo/docker/fedora41/fedora41.Dockerfile
            output: reports/trivy-DLS_fedora41.json
          - name: dlstreamer-testing-ubuntu
            path: dlstreamer-repo/docker/ubuntu/ubuntu-testing.Dockerfile
            output: reports/trivy-DLS-testing-ubuntu.json
    uses: ./.github/workflows/trivy-config-mode.yaml
    with:
      dockerfile-path: ${{ matrix.path }}
      trivy-report-format: 'json'
      severity-levels: 'HIGH,CRITICAL'
      output-report-path: ${{ matrix.output }}
      name: DLS_${{ matrix.name }}

  dls-hadolint:
    permissions:
      contents: read
      pull-requests: write
    needs: [check-skip-ci, dls-filter-docker-related-changes]
    if: needs.check-skip-ci.outputs.skip_ci != 'true' && needs.dls-filter-docker-related-changes.outputs.docker_changed == 'true'
    name: "DLS SCAN: Hadolint"
    runs-on: dlstreamer
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dlstreamer_ubuntu22
            dockerfile: ./docker/ubuntu/ubuntu22.Dockerfile
            output-file: hadolint-dlstreamer_ubuntu22.json
          - name: dlstreamer_ubuntu24
            dockerfile: ./docker/ubuntu/ubuntu24.Dockerfile
            output-file: hadolint-dlstreamer_ubuntu24.json
          - name: dlstreamer_fedora41
            dockerfile: ./docker/fedora41/fedora41.Dockerfile
            output-file: hadolint-dlstreamer_fedora41.json
          - name: dlstreamer-testing-ubuntu
            dockerfile: ./docker/ubuntu/ubuntu-testing.Dockerfile
            output-file: hadolint-dlstreamer-testing-ubuntu.json
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false

      - name: Run Hadolint Action
        uses: ./.github/actions/common/hadolint
        with:
          dockerfile: ${{ matrix.dockerfile }}
          output-file: ${{ matrix.output-file }}
          name: DLS_${{ matrix.name }}
          enable-reviewdog: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-findings: true

  dls-pylint:
    permissions:
      contents: read
      pull-requests: write
    name: "DLS SCAN: pylint"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          path: dlstreamer-repo

      - name: Run pylint
        uses: ./dlstreamer-repo/.github/actions/common/pylint
        with:
          path: dlstreamer-repo
          output-file: pylint-report.txt
          name: DLS_pylint
          enable-reviewdog: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-findings: true

      - name: Clean up
        run: |
          sudo rm -rf dlstreamer-repo

  dls-shellcheck:
    permissions:
      contents: read
      pull-requests: write
    name: "DLS SCAN: shellcheck"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run shellcheck
        uses: ./.github/actions/common/shellcheck
        with:
          path: .
          output-file: shellcheck-report.txt
          name: DLS_shellcheck
          enable-reviewdog: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-findings: true

  dls-yamllint:
    permissions:
      contents: read
      pull-requests: write
    name: "DLS SCAN: yamllint"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false

      - name: Run yamlint
        uses: ./.github/actions/common/yamllint
        with:
          path: .
          output-file: yamllint-report.txt
          name: DLS_yamlint
          enable-reviewdog: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-findings: true

  dls-clamav:
    permissions:
      contents: read
    name: "DLS SCAN: ClamAV antivirus"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          path: dlstreamer-repo

      - name: ClamAV scan
        id: clamav-dls-scan
        uses: open-edge-platform/orch-ci/.github/actions/security/clamav@76700c2fb6d547733b9218d9638dca43f5296399 # 0.1.52
        with:
          scan-scope: all
          paths: dlstreamer-repo
          report_suffix: "DLS_ClamAV_antivirus_report"
          fail-on-findings: true

      - name: Analyze ClamAV results
        if: always()
        env:
          REPORT_PATH: ${{ steps.clamav-dls-scan.outputs.report_path }}
        run: |
          if [ -n "$REPORT_PATH" ] && [ -f "$REPORT_PATH" ]; then
            echo "📄 Found ClamAV report: $REPORT_PATH"

            # Extract scan summary using jq
            files_scanned=$(jq -r '.scan_summary.files_scanned // 0' "$REPORT_PATH" 2>/dev/null || echo "0")
            threats_found=$(jq -r '.scan_summary.threats_found // 0' "$REPORT_PATH" 2>/dev/null || echo "0")

            echo "### ClamAV Antivirus Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- 📁 **Files scanned**: $files_scanned" >> $GITHUB_STEP_SUMMARY
            echo "- 🦠 **Threats found**: $threats_found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$threats_found" -gt 0 ]; then
              echo "❌ **Security Alert**: Malware or threats detected!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **Action Required**: Review the ClamAV report artifact for details." >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **All files are clean - no threats detected!**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ClamAV Antivirus Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **ClamAV report not found at path: ${REPORT_PATH:-not provided}**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Clean up
        if: always()
        run: |
          sudo rm -rf dlstreamer-repo

  dls-bandit:
    permissions:
      contents: read
    name: "DLS SCAN: Bandit"
    runs-on: dlstreamer
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false

      - name: Run Bandit scan
        uses: open-edge-platform/orch-ci/.github/actions/security/bandit@76700c2fb6d547733b9218d9638dca43f5296399 # 0.1.52
        with:
          scan-scope: "changed"
          severity-level: "HIGH"
          confidence-level: "HIGH"
          output-format: "txt"
          fail-on-findings: true
          paths: .
          report_suffix: dlstreamer

  dls-download-models:
    permissions:
      contents: read
    name: "DLS TEST: models download"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-download-models-test.yaml
  #--------------------------------------------------------- - OPTIMIZER -------------------------------------------------------------
  dls-optimizer-functional-tests:
    permissions:
      contents: read
      packages: read
    name: "DLS TEST: Optimizer"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-test-optimizer.yaml
    with:
      test-repo-branch: ${{ inputs.test-repo-branch }}
  # -------------------------------------------------------- BUILDS & TESTS ---------------------------------------------------------
  dls-build-fedora-img:
    permissions:
      contents: read
      packages: read
    name: "DLS BUILD: fedora41 img"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-build-fedora41-images.yaml

  dls-build-sources-make-build:
    permissions:
      contents: read
      packages: read
    name: "DLS BUILD: make build"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-build-sources-make-build.yaml

  dls-build-dev-images-and-run-unit-tests:
    permissions:
      contents: read
      packages: read
    name: "DLS BUILD: dev imgs & run unit tests"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-build-dev-docker-images-and-run-unit.yaml

  dls-build-and-test-deb-and-deb_img:
    permissions:
      contents: read
      packages: read
    name: "DLS BUILD & TEST: .deb pkgs & img"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-build-and-test-deb_pkgs-and-deb_imgs.yaml
    with:
      test-repo-branch: ${{ inputs.test-repo-branch }}

  dls-build-and-test-windows:
    permissions:
      contents: read
      packages: read
    name: "DLS BUILD & TEST: Windows DLLs"
    needs: check-skip-ci
    if: needs.check-skip-ci.outputs.skip_ci != 'true'
    uses: ./.github/workflows/dls-build-and-test-windows.yaml
    with:
      test-repo-branch: ${{ inputs.test-repo-branch }}

summary:
  name: "Workflow Summary"
  runs-on: dlstreamer
  needs: check-skip-ci
  if: always()
  steps:
    - name: Summary
      run: |
        if [ "${{ needs.check-skip-ci.outputs.skip_ci }}" = "true" ]; then
          echo "✅ Only documentation and configuration changes detected - CI jobs skipped successfully"
          echo "### 📚 Documentation/Configuration-only changes detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All CI jobs were skipped because changes were only in documentation and configuration files:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Allowed files/folders:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/\` - Documentation folder" >> $GITHUB_STEP_SUMMARY
          echo "- \`.github/ISSUE_TEMPLATES/\` - Issue templates" >> $GITHUB_STEP_SUMMARY
          echo "- \`.github/skills/\` - Skills folder" >> $GITHUB_STEP_SUMMARY
          echo "- \`.github/CODEOWNERS\` - Code owners file" >> $GITHUB_STEP_SUMMARY
          echo "- \`.github/PULL_REQUEST_TEMPLATE.md\` - PR template" >> $GITHUB_STEP_SUMMARY
          echo "- \`README.md\` - Main readme file" >> $GITHUB_STEP_SUMMARY
          echo "- \`SECURITY.md\` - Security policy" >> $GITHUB_STEP_SUMMARY
          echo "- \`LICENSE\` - License file" >> $GITHUB_STEP_SUMMARY
          echo "- \`CONTRIBUTING.md\` - Contributing guidelines" >> $GITHUB_STEP_SUMMARY
          echo "- \`CHANGELOG.md\` - Changelog file" >> $GITHUB_STEP_SUMMARY
          echo "- \`CODESTYLE.md\` - Codestyle file" >> $GITHUB_STEP_SUMMARY
          echo "- \`CODE_OF_CONDUCT.md\` - Code of conduct" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is expected behavior to save CI resources for documentation and configuration updates." >> $GITHUB_STEP_SUMMARY
        else
          echo "🔄 Code changes detected - full CI pipeline executed"
          echo "### 🔄 Full CI pipeline executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes detected outside documentation and configuration files - all CI jobs were executed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This means there were modifications to source code, build files, or other files that require full CI validation." >> $GITHUB_STEP_SUMMARY
        fi
